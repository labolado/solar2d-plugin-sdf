name: Package and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build tgz packages
        run: |
          # Create staging directory with plugin files
          STAGING=$(mktemp -d)
          mkdir -p "$STAGING/lua/plugin"
          cp plugin/sdf.lua "$STAGING/lua/plugin/sdf.lua"
          cp sdf_shapes.lua "$STAGING/lua/sdf_shapes.lua"
          cat > "$STAGING/metadata.lua" << 'METALUA'
          local metadata =
          {
            plugin =
            {
              format = 'lua',
            },
          }
          return metadata
          METALUA

          # Build one tgz (all platforms share the same Lua code)
          tar czf plugin.sdf.tgz -C "$STAGING" .

          # Create per-platform copies (required by Solar2D plugin system)
          mkdir -p release
          for p in iphone iphone-sim mac-sim android win32-sim appletvos; do
            cp plugin.sdf.tgz "release/plugin.sdf-${p}.tgz"
          done

          echo "=== Release files ==="
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          generate_release_notes: true
          files: release/*.tgz
